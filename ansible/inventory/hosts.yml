---
# atl.sh inventory — dev (Docker), staging (Hetzner VPS), prod (physical)
#
# Usage:
#   just deploy dev      → -l dev
#   just deploy staging  → -l staging  (STAGING_HOST / staging.atl.sh)
#   just deploy prod     → -l prod     (PROD_HOST / atl.sh)

all:
  children:
    # Local development container (Docker)
    dev:
      hosts:
        atl-sh-dev:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: root
          ansible_ssh_private_key_file: ../.ssh/dev_key
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    # Staging: Terraform-provisioned Hetzner Cloud VPS
    staging:
      hosts:
        atl-pubnix-staging:
          ansible_host: "{{ lookup('env', 'STAGING_HOST') | default('staging.atl.sh', true) }}"
          ansible_user: root

    # Production: Physical Hetzner server
    prod:
      hosts:
        atl-pubnix:
          ansible_host: "{{ lookup('env', 'PROD_HOST') | default('atl.sh', true) }}"
          ansible_user: root

    # Combined staging+prod for user management (specify staging or prod instead)
    pubnix:
      children:
        staging:
        prod:
